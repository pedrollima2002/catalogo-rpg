<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Painel Administrativo</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="admin-container">
      <h1>Painel Administrativo</h1>

      <form id="formProduto">
        <label>Nome do Produto</label>

        <input type="text" id="nome" placeholder="Ex: Adidas Básica" required />

        <label>Preço</label>

        <input
          type="number"
          id="preco"
          placeholder="44.90"
          step="0.01"
          required
        />

        <label>Categoria</label>

        <input type="text" id="categoria" placeholder="Ex: Adidas" required />

        <hr />

        <h2>Adicionar Cor</h2>

        <label>Nome da Cor</label>

        <input type="text" id="cor" placeholder="Preta" />

        <label>Imagem</label>

        <input type="file" id="imagem" accept="image/*" />

        <button type="button" id="adicionarCor">Adicionar Cor</button>

        <hr />

        <h2>Cores cadastradas</h2>

        <div id="listaCores"></div>

        <button type="submit" id="salvarProduto">Salvar Produto</button>
      </form>
    </div>

    <script src="js/admin.js"></script>
  </body>
</html>
